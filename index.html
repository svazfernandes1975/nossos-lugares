<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nossos Lugares · Andrea & Sergio</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--muted:#555;--muted2:#888;
  --amber:#fbbf24;--blue:#60a5fa;--green:#4ade80;--coral:#fb7185;
  --u1:#f97316;--u2:#a78bfa; /* user colors: orange / purple */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}

/* ── MAP ── */
#map{position:fixed;inset:0;z-index:1}
.leaflet-control-attribution{background:rgba(10,10,10,.7)!important;color:#444!important;font-size:9px!important}
.leaflet-control-attribution a{color:#555!important}

/* ── TOPBAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,10,10,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border2);
  padding:.7rem 1.5rem;
  display:flex;align-items:center;gap:1rem;flex-wrap:nowrap;
}
.brand{font-weight:800;font-size:1rem;white-space:nowrap;letter-spacing:-.01em}
.brand em{color:var(--amber);font-style:normal}

.vtoggle{
  display:flex;gap:3px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px;
  flex-shrink:0;
}
.vbtn{
  font-family:'DM Mono',monospace;font-size:10px;padding:4px 12px;
  border-radius:16px;border:none;background:transparent;color:var(--muted2);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.vbtn.on{background:var(--bg2);color:var(--text)}
.vbtn.on.vu1{color:var(--u1)}
.vbtn.on.vu2{color:var(--u2)}

.statsbar{display:flex;gap:1.25rem;flex:1;align-items:center;flex-wrap:nowrap}
.sitem{display:flex;flex-direction:column;align-items:center;min-width:40px}
.sval{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:700;line-height:1}
.slbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

.autharea{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
#uavatar{width:26px;height:26px;border-radius:50%;border:2px solid var(--u1);display:none}
#authbtn{
  font-family:'DM Mono',monospace;font-size:10px;padding:5px 12px;
  border-radius:20px;border:1px solid var(--border2);background:var(--bg3);
  color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap;
}
#authbtn:hover{border-color:var(--amber);color:var(--amber)}
#authbtn.in{border-color:var(--green);color:var(--green)}

/* ── FAB ── */
#fab{
  position:fixed;bottom:2rem;right:2rem;z-index:200;
  width:52px;height:52px;border-radius:50%;
  background:var(--amber);color:#000;border:none;
  font-size:1.5rem;font-weight:700;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(251,191,36,.4);
  transition:transform .2s,box-shadow .2s;
}
#fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(251,191,36,.5)}
#fab.vis{display:flex}

/* ── CROSS STATS ── */
#xstats{
  position:fixed;bottom:2rem;left:1.5rem;z-index:100;
  background:rgba(10,10,10,.9);backdrop-filter:blur(12px);
  border:1px solid var(--border2);border-radius:12px;
  padding:.55rem 1rem;
  display:none;gap:1.25rem;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);
}
#xstats.vis{display:flex}
#xstats strong{color:var(--text)}

/* ── PANEL ── */
#panel{
  position:fixed;top:0;right:-420px;width:400px;height:100vh;z-index:300;
  background:var(--bg2);border-left:1px solid var(--border2);
  display:flex;flex-direction:column;
  transition:right .3s cubic-bezier(.4,0,.2,1);
}
#panel.open{right:0}

.ph{
  padding:1.1rem 1.5rem;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.pt{font-size:.95rem;font-weight:700}
.pc{background:none;border:none;color:var(--muted2);font-size:1.1rem;cursor:pointer;padding:3px 8px;border-radius:6px;transition:color .15s,background .15s}
.pc:hover{color:var(--text);background:var(--bg3)}

.pb{flex:1;overflow-y:auto;padding:1.1rem 1.5rem;display:flex;flex-direction:column;gap:.85rem}

/* form */
.flbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.fg{display:flex;flex-direction:column}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

.fi,.fs,.fta{
  width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  padding:.55rem .85rem;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;
  outline:none;transition:border-color .15s;
}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--amber)}
.fi::placeholder,.fta::placeholder{color:var(--muted)}
.fs{cursor:pointer;appearance:none}
.fta{resize:vertical;min-height:72px}

/* geo results */
#gres{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;overflow:hidden;display:none;margin-top:4px}
.gr{padding:.55rem .85rem;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s,color .1s}
.gr:last-child{border-bottom:none}
.gr:hover{background:var(--border);color:var(--text)}
.gr strong{color:var(--text);display:block;font-size:12px;margin-bottom:1px}

/* location preview */
#lprev{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:.65rem .9rem;display:none}
.ln{font-size:.88rem;font-weight:700;margin-bottom:2px}
.lm{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2)}

/* buttons */
.bsave{
  width:100%;background:var(--amber);color:#000;border:none;border-radius:8px;
  padding:.7rem;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:opacity .15s;
}
.bsave:hover{opacity:.9}
.bsave:disabled{opacity:.35;cursor:default}
.bcancel{
  width:100%;background:none;color:var(--muted2);border:1px solid var(--border2);
  border-radius:8px;padding:.6rem;font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;transition:all .15s;
}
.bcancel:hover{border-color:var(--coral);color:var(--coral)}

/* ── POPUP ── */
.leaflet-popup-content-wrapper{background:var(--bg2)!important;border:1px solid var(--border2)!important;border-radius:12px!important;box-shadow:0 4px 24px rgba(0,0,0,.6)!important;color:var(--text)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;width:auto!important}
.leaflet-popup-tip-container{display:none}
.pbox{padding:14px 16px}
.pname{font-size:.92rem;font-weight:700;margin-bottom:4px}
.pmeta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);line-height:1.7}
.puser{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;padding:1px 8px;border-radius:20px;margin-top:6px}
.pdel{display:block;margin-top:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--coral);background:none;border:1px solid #5a1a1a;border-radius:6px;padding:3px 10px;cursor:pointer;width:100%;text-align:left;transition:background .15s}
.pdel:hover{background:#1f0a0a}

/* ── MARKER ── */
.leaflet-div-icon{background:transparent!important;border:none!important;box-shadow:none!important}
.mk{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:2px solid rgba(0,0,0,.25);font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5);transition:transform .15s}
.mk:hover{transform:scale(1.15)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);
  z-index:500;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;
  padding:.6rem 1.2rem;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);
  transition:transform .3s;white-space:nowrap;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:.1em;
  transition:opacity .4s;
}
#loading.gone{opacity:0;pointer-events:none}

/* ── EMPTY STATE ── */
#empty{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;
  text-align:center;pointer-events:none;display:none;
}
#empty.vis{display:block}
.etitle{font-size:1.1rem;font-weight:700;color:var(--muted2);margin-bottom:.4rem}
.esub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}

/* ── MOBILE ── */
@media(max-width:640px){
  #topbar{padding:.6rem 1rem;gap:.6rem}
  .brand{font-size:.85rem}
  .statsbar{display:none}
  #panel{width:100%;right:-100%;border-left:none;border-top:1px solid var(--border2);height:90vh;top:auto;bottom:-90vh;border-radius:16px 16px 0 0}
  #panel.open{bottom:0;right:0}
  #fab{bottom:1.5rem;right:1.5rem;width:46px;height:46px;font-size:1.3rem}
  #xstats{font-size:9px;padding:.45rem .75rem;gap:.75rem;left:1rem}
}
</style>
</head>
<body>

<div id="loading">carregando mapa...</div>

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">🌍 <em>Nossos</em> Lugares</div>

  <div class="vtoggle">
    <button class="vbtn on"  id="vb-all" onclick="setView('all')">Todos</button>
    <button class="vbtn vu1" id="vb-u1"  onclick="setView('u1')">—</button>
    <button class="vbtn vu2" id="vb-u2"  onclick="setView('u2')">—</button>
  </div>

  <div class="statsbar">
    <div class="sitem"><div class="sval" id="st-c" style="color:var(--amber)">0</div><div class="slbl">países</div></div>
    <div class="sitem"><div class="sval" id="st-k" style="color:var(--blue)">0</div><div class="slbl">continentes</div></div>
    <div class="sitem"><div class="sval" id="st-p" style="color:var(--green)">0</div><div class="slbl">cidades</div></div>
    <div class="sitem"><div class="sval" id="st-m" style="color:var(--coral)">0</div><div class="slbl">km</div></div>
  </div>

  <div class="autharea">
    <img id="uavatar">
    <button id="authbtn" onclick="doAuth()">Entrar</button>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- FAB -->
<button id="fab" class="" onclick="openPanel()" title="Adicionar lugar">+</button>

<!-- CROSS STATS -->
<div id="xstats">
  <span>🤝 em comum <strong id="xs-c">0</strong></span>
  <span style="color:var(--u1)">só de <strong id="xs-n1">—</strong>: <strong id="xs-1">0</strong></span>
  <span style="color:var(--u2)">só de <strong id="xs-n2">—</strong>: <strong id="xs-2">0</strong></span>
</div>

<!-- EMPTY STATE -->
<div id="empty">
  <div class="etitle">Nenhum lugar ainda</div>
  <div class="esub">Entre com sua conta Google e adicione o primeiro lugar</div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="ph">
    <span class="pt">📍 Adicionar lugar</span>
    <button class="pc" onclick="closePanel()">✕</button>
  </div>
  <div class="pb">

    <div class="fg">
      <div class="flbl">Buscar cidade ou lugar</div>
      <input class="fi" id="si" placeholder="ex: Roma, Eiffel Tower, Hard Rock NYC…" oninput="onSI()" onkeydown="if(event.key==='Enter')doGeo()">
      <div id="gres"></div>
    </div>

    <div id="lprev">
      <div class="ln" id="ln"></div>
      <div class="lm" id="lm"></div>
    </div>

    <div class="fg">
      <div class="flbl">Categoria</div>
      <select class="fs" id="f-cat">
        <option value="cidade">🏙️ Cidade</option>
        <option value="ponto">🏛️ Ponto Turístico</option>
        <option value="hardrock">🎸 Hard Rock Café</option>
        <option value="praia">🏖️ Praia</option>
        <option value="natureza">🏔️ Natureza</option>
        <option value="restaurante">🍽️ Restaurante</option>
        <option value="outro">📌 Outro</option>
      </select>
    </div>

    <div class="fr">
      <div class="fg"><div class="flbl">País</div><input class="fi" id="f-country" placeholder="País"></div>
      <div class="fg">
        <div class="flbl">Continente</div>
        <select class="fs" id="f-cont">
          <option value="">Selecione</option>
          <option>América do Sul</option>
          <option>América do Norte</option>
          <option>América Central</option>
          <option>Europa</option>
          <option>África</option>
          <option>Ásia</option>
          <option>Oceania</option>
          <option>Antártida</option>
        </select>
      </div>
    </div>

    <div class="fg"><div class="flbl">Ano da visita (opcional)</div><input class="fi" id="f-year" type="number" placeholder="ex: 2019" min="1900" max="2030"></div>
    <div class="fg"><div class="flbl">Observações (opcional)</div><textarea class="fta" id="f-notes" placeholder="Memórias, avaliação, dicas…"></textarea></div>

    <button class="bsave" id="bsave" onclick="savePlace()" disabled>Salvar lugar</button>
    <button class="bcancel" onclick="closePanel()">Cancelar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyBJROGm0ENKVfkKQzPU60v_X-pQKbr_4iw",
  authDomain: "mapa-viagens-andrea-sergio.firebaseapp.com",
  projectId: "mapa-viagens-andrea-sergio",
  storageBucket: "mapa-viagens-andrea-sergio.firebasestorage.app",
  messagingSenderId: "170780046387",
  appId: "1:170780046387:web:078645c776597ba22f9f46"
});
const db   = firebase.firestore();
const auth = firebase.auth();

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let me       = null;       // current Firebase user
let places   = [];         // all Firestore places
let view     = 'all';      // 'all' | 'u1' | 'u2'
let pending  = null;       // geocoding result awaiting save
let markers  = {};         // placeId → Leaflet marker
let stimer   = null;       // search debounce
let geoData  = [];         // last geocoding results
let map;
let uids     = [];         // ordered user UIDs [first, second]

// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const SP = [-23.5505, -46.6333]; // São Paulo

const ICONS = {cidade:'🏙️',ponto:'🏛️',hardrock:'🎸',praia:'🏖️',natureza:'🏔️',restaurante:'🍽️',outro:'📌'};

const CONT = {
  'brazil':'América do Sul','argentina':'América do Sul','chile':'América do Sul',
  'peru':'América do Sul','colombia':'América do Sul','uruguai':'América do Sul',
  'uruguay':'América do Sul','bolívia':'América do Sul','bolivia':'América do Sul',
  'paraguai':'América do Sul','paraguay':'América do Sul','equador':'América do Sul',
  'ecuador':'América do Sul','venezuela':'América do Sul','guiana':'América do Sul',
  'guyana':'América do Sul','suriname':'América do Sul',
  'estados unidos':'América do Norte','united states':'América do Norte','usa':'América do Norte',
  'canada':'América do Norte','canadá':'América do Norte',
  'méxico':'América Central','mexico':'América Central','guatemala':'América Central',
  'honduras':'América Central','el salvador':'América Central','nicarágua':'América Central',
  'nicaragua':'América Central','costa rica':'América Central','panamá':'América Central',
  'panama':'América Central','cuba':'América Central','jamaica':'América Central',
  'haiti':'América Central','república dominicana':'América Central',
  'bahamas':'América Central','barbados':'América Central','trinidad':'América Central',
  'portugal':'Europa','espanha':'Europa','spain':'Europa','france':'Europa','frança':'Europa',
  'itália':'Europa','italy':'Europa','alemanha':'Europa','germany':'Europa',
  'reino unido':'Europa','united kingdom':'Europa','england':'Europa','scotland':'Europa',
  'holanda':'Europa','netherlands':'Europa','bélgica':'Europa','belgium':'Europa',
  'suíça':'Europa','switzerland':'Europa','áustria':'Europa','austria':'Europa',
  'grécia':'Europa','greece':'Europa','croácia':'Europa','croatia':'Europa',
  'república tcheca':'Europa','czech republic':'Europa','polônia':'Europa','poland':'Europa',
  'hungria':'Europa','hungary':'Europa','romênia':'Europa','romania':'Europa',
  'suécia':'Europa','sweden':'Europa','noruega':'Europa','norway':'Europa',

  'irlanda':'Europa','ireland':'Europa','turquia':'Europa','turkey':'Europa',
  'rússia':'Europa','russia':'Europa','ucrânia':'Europa','ukraine':'Europa',
  'japão':'Ásia','japan':'Ásia','china':'Ásia','coreia do sul':'Ásia','south korea':'Ásia',
  'tailândia':'Ásia','thailand':'Ásia','vietnã':'Ásia','vietnam':'Ásia',

  'singapura':'Ásia','singapore':'Ásia','índia':'Ásia','india':'Ásia',
  'nepal':'Ásia','filipinas':'Ásia','philippines':'Ásia','camboja':'Ásia','cambodia':'Ásia',
  'emirados':'Ásia','united arab emirates':'Ásia','uae':'Ásia','qatar':'Ásia',
  'israel':'Ásia','jordânia':'Ásia','jordan':'Ásia','arábia saudita':'Ásia',
  'maldivas':'Ásia','maldives':'Ásia','sri lanka':'Ásia',
  'egito':'África','egypt':'África','marrocos':'África','morocco':'África',
  'áfrica do sul':'África','south africa':'África','quênia':'África','kenya':'África',
  'tanzânia':'África','tanzania':'África','tunísia':'África','tunisia':'África',
  'gana':'África','ghana':'África','etiópia':'África','ethiopia':'África',
  'austrália':'Oceania','australia':'Oceania','nova zelândia':'Oceania','new zealand':'Oceania',
  'fiji':'Oceania',
};

function guessContinent(country) {
  if (!country) return '';
  const k = country.toLowerCase();
  for (const [n, c] of Object.entries(CONT)) {
    if (k.includes(n) || n.includes(k)) return c;
  }
  return '';
}

// ═══════════════════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', { zoomControl:false }).setView([20, 10], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© <a href="https://openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd', maxZoom:19
  }).addTo(map);
  L.control.zoom({ position:'bottomright' }).addTo(map);
}

function uColor(uid) {
  return uid === uids[0] ? getComputedStyle(document.documentElement).getPropertyValue('--u1').trim()
                         : getComputedStyle(document.documentElement).getPropertyValue('--u2').trim();
}

function uName(place) { return (place.userName || '').split(' ')[0] || 'Usuário'; }

function makeIcon(place) {
  const c = uColor(place.userId);
  const e = ICONS[place.category] || '📌';
  return L.divIcon({
    className:'',
    html:`<div style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:${c};border:3px solid ${c}88;font-size:18px;box-shadow:0 2px 10px rgba(0,0,0,.6);cursor:pointer">${e}</div>`,
    iconSize:[36,36], iconAnchor:[18,18], popupAnchor:[0,-20],
  });
}

function makePopup(place) {
  const c = uColor(place.userId);
  const canDel = me !== null;
  const meta = [
    place.city && place.city !== place.name ? place.city : null,
    place.country, place.continent,
    place.year ? '📅 ' + place.year : null,
    place.notes ? '💬 ' + place.notes : null,
  ].filter(Boolean).join(' · ');

  return `<div class="pbox">
    <div class="pname">${ICONS[place.category]||'📌'} ${place.name}</div>
    <div class="pmeta">${meta}</div>
    <span class="puser" style="background:${c}22;color:${c};border:1px solid ${c}44">${uName(place)}</span>
    ${canDel ? `<button class="pdel" onclick="delPlace('${place.id}')">✕ Remover</button>` : ''}
  </div>`;
}

function renderMap() {
  // Determine visible places
  let vis = places;
  if (view === 'u1') vis = places.filter(p => p.userId === uids[0]);
  if (view === 'u2') vis = places.filter(p => p.userId === uids[1]);

  // Remove all markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  // Add markers
  vis.forEach(p => {
    if (isNaN(p.lat) || isNaN(p.lng)) return;
    const m = L.marker([p.lat, p.lng], { icon: makeIcon(p) });
    m.bindPopup(makePopup(p), { maxWidth:260, minWidth:200 });
    m.addTo(map);
    markers[p.id] = m;
  });

  updateStats(vis);
  updateCross();
  updateEmpty();
}

// ═══════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════
function hav(la1, lo1, la2, lo2) {
  const R = 6371, d2r = Math.PI/180;
  const dLa = (la2-la1)*d2r, dLo = (lo2-lo1)*d2r;
  const a = Math.sin(dLa/2)**2 + Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dLo/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function updateStats(vis) {
  const countries  = new Set(vis.map(p=>p.country).filter(Boolean));
  const continents = new Set(vis.map(p=>p.continent).filter(Boolean));
  const cities     = new Set(vis.map(p=>p.city||p.name).filter(Boolean));
  const km = Math.round(vis.reduce((s,p)=>s+hav(SP[0],SP[1],p.lat,p.lng),0));

  document.getElementById('st-c').textContent = countries.size;
  document.getElementById('st-k').textContent = continents.size;
  document.getElementById('st-p').textContent = cities.size;
  document.getElementById('st-m').textContent = km >= 1000 ? (km/1000).toFixed(1)+'k' : km;
}

function updateCross() {
  const el = document.getElementById('xstats');
  if (view !== 'all' || uids.length < 2) { el.classList.remove('vis'); return; }

  const c1 = new Set(places.filter(p=>p.userId===uids[0]).map(p=>p.country).filter(Boolean));
  const c2 = new Set(places.filter(p=>p.userId===uids[1]).map(p=>p.country).filter(Boolean));
  const common = [...c1].filter(c=>c2.has(c)).length;
  const e1 = [...c1].filter(c=>!c2.has(c)).length;
  const e2 = [...c2].filter(c=>!c1.has(c)).length;

  document.getElementById('xs-c').textContent = common;
  document.getElementById('xs-1').textContent = e1;
  document.getElementById('xs-2').textContent = e2;
  el.classList.add('vis');
}

function updateEmpty() {
  const el = document.getElementById('empty');
  el.classList.toggle('vis', places.length === 0);
}

// ═══════════════════════════════════════════════════════════════
// VIEW
// ═══════════════════════════════════════════════════════════════
function setView(v) {
  view = v;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('vb-'+v).classList.add('on');
  renderMap();
}

function refreshLabels() {
  const u1 = places.find(p=>p.userId===uids[0]);
  const u2 = places.find(p=>p.userId===uids[1]);
  if (u1) {
    document.getElementById('vb-u1').textContent = uName(u1);
    document.getElementById('xs-n1').textContent = uName(u1);
  }
  if (u2) {
    document.getElementById('vb-u2').textContent = uName(u2);
    document.getElementById('xs-n2').textContent = uName(u2);
  }
}

// ═══════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════
function doAuth() {
  if (me) { if (confirm('Sair da conta?')) auth.signOut(); return; }
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .catch(e => toast('Erro ao entrar: ' + e.message));
}

const ALLOWED = ['svazfernandes@gmail.com', 'andreabalieiro@gmail.com'];

auth.onAuthStateChanged(user => {
  // Rejeita qualquer conta fora da lista
  if (user && !ALLOWED.includes(user.email)) {
    auth.signOut();
    toast('⛔ Acesso restrito — conta não autorizada');
    return;
  }
  me = user;
  const btn = document.getElementById('authbtn');
  const av  = document.getElementById('uavatar');
  const fab = document.getElementById('fab');

  if (user) {
    btn.textContent = user.displayName?.split(' ')[0] || 'Sair';
    btn.classList.add('in');
    if (user.photoURL) { av.src = user.photoURL; av.style.display='block'; }
    fab.classList.add('vis');
  } else {
    btn.textContent = 'Entrar';
    btn.classList.remove('in');
    av.style.display = 'none';
    fab.classList.remove('vis');
  }
  renderMap(); // refresh popups (show/hide delete)
});

// ═══════════════════════════════════════════════════════════════
// FIRESTORE
// ═══════════════════════════════════════════════════════════════
db.collection('places').orderBy('timestamp','desc').onSnapshot(snap => {
  places = snap.docs.map(d => ({ id:d.id, ...d.data() }));

  // Build ordered uids list
  const seen = new Set();
  uids = [];
  places.forEach(p => { if (!seen.has(p.userId)) { seen.add(p.userId); uids.push(p.userId); }});

  renderMap();
  refreshLabels();

  // Hide loading
  const l = document.getElementById('loading');
  l.classList.add('gone');
  setTimeout(() => l.remove(), 500);
}, err => {
  console.error(err);
  document.getElementById('loading').textContent = 'Erro: ' + err.message;
});

// ═══════════════════════════════════════════════════════════════
// DELETE
// ═══════════════════════════════════════════════════════════════
async function delPlace(id) {
  if (!me) return;
  if (!confirm('Remover este lugar?')) return;
  try {
    await db.collection('places').doc(id).delete();
    toast('Lugar removido');
  } catch(e) { toast('Erro: '+e.message); }
}

// ═══════════════════════════════════════════════════════════════
// GEOCODING (Nominatim)
// ═══════════════════════════════════════════════════════════════
function onSI() {
  clearTimeout(stimer);
  const v = document.getElementById('si').value.trim();
  if (v.length < 3) { document.getElementById('gres').style.display='none'; return; }
  stimer = setTimeout(doGeo, 650);
}

async function doGeo() {
  const q = document.getElementById('si').value.trim();
  if (!q) return;
  const el = document.getElementById('gres');
  el.style.display = 'block';
  el.innerHTML = '<div class="gr">Buscando...</div>';
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1&accept-language=pt`,
      { headers:{'User-Agent':'mapa-viagens-andrea-sergio/1.0'} }
    );
    geoData = await r.json();
    if (!geoData.length) { el.innerHTML='<div class="gr">Nenhum resultado</div>'; return; }
    el.innerHTML = geoData.map((r,i) => `<div class="gr" onclick="pickGeo(${i})">
      <strong>${r.display_name.split(',')[0]}</strong>
      ${r.display_name.split(',').slice(1,3).join(',').trim()}
    </div>`).join('');
  } catch(e) { el.innerHTML='<div class="gr">Erro na busca</div>'; }
}

function pickGeo(i) {
  const r = geoData[i];
  const addr = r.address || {};
  const name    = r.display_name.split(',')[0].trim();
  const city    = addr.city || addr.town || addr.village || addr.municipality || name;
  const country = addr.country || r.display_name.split(',').slice(-1)[0].trim();

  pending = { lat: parseFloat(r.lat), lng: parseFloat(r.lon), name, city, country };

  // fill form
  document.getElementById('f-country').value = country;
  const cont = guessContinent(country);
  if (cont) document.getElementById('f-cont').value = cont;

  // preview
  document.getElementById('ln').textContent = name;
  document.getElementById('lm').textContent = r.display_name.split(',').slice(1,4).join(',').trim();
  document.getElementById('lprev').style.display = 'block';
  document.getElementById('gres').style.display  = 'none';
  document.getElementById('si').value = name;
  document.getElementById('bsave').disabled = false;

  map.flyTo([pending.lat, pending.lng], Math.max(map.getZoom(), 8), { duration:1.5 });
}

// ═══════════════════════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════════════════════
async function savePlace() {
  if (!me || !pending) return;
  const btn = document.getElementById('bsave');
  btn.disabled = true; btn.textContent = 'Salvando…';

  const doc = {
    name:      pending.name,
    city:      pending.city,
    country:   document.getElementById('f-country').value.trim(),
    continent: document.getElementById('f-cont').value,
    category:  document.getElementById('f-cat').value,
    year:      parseInt(document.getElementById('f-year').value) || null,
    notes:     document.getElementById('f-notes').value.trim(),
    lat:       pending.lat,
    lng:       pending.lng,
    userId:    me.uid,
    userName:  me.displayName || me.email,
    userEmail: me.email,
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
  };

  try {
    await db.collection('places').add(doc);
    toast('✓ ' + doc.name + ' adicionado!');
    closePanel();
  } catch(e) {
    toast('Erro: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Salvar lugar';
  }
}

// ═══════════════════════════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════════════════════════
function openPanel() {
  if (!me) { toast('Faça login para adicionar lugares'); return; }
  resetForm();
  document.getElementById('panel').classList.add('open');
  document.getElementById('si').focus();
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

function resetForm() {
  pending = null;
  ['si','f-country','f-year','f-notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-cat').value  = 'cidade';
  document.getElementById('f-cont').value = '';
  document.getElementById('gres').style.display  = 'none';
  document.getElementById('lprev').style.display = 'none';
  document.getElementById('bsave').disabled = true;
  document.getElementById('bsave').textContent = 'Salvar lugar';
}

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
initMap();
setTimeout(() => {
  // Fallback: hide loading after 6s even if Firestore doesn't respond
  const l = document.getElementById('loading');
  if (l) { l.classList.add('gone'); setTimeout(()=>l.remove(), 500); }
}, 6000);
</script>
